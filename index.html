<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Race Registration</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg-primary: #ffffff; --bg-secondary: #f5f5f3; --text-primary: #1a1a18; --text-secondary: #6b6b67; --border-light: rgba(0,0,0,0.08); --green-fill: #EAF3DE; --green-border: #97C459; --green-text: #27500A; --red-fill: #FCEBEB; --red-border: #F09595; --red-text: #501313; --blue-strong: #185FA5; }
  body { font-family: -apple-system, sans-serif; background: #eeede9; color: var(--text-primary); }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg-primary); display: flex; flex-direction: column; }
  .top-bar { padding: 16px; border-bottom: 0.5px solid var(--border-light); position: sticky; top: 0; background: var(--bg-primary); z-index: 10; }
  .app-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .filter-btn { font-size: 13px; padding: 6px 14px; border-radius: 999px; border: 0.5px solid var(--border-light); background: transparent; cursor: pointer; }
  .filter-btn.active { background: var(--bg-secondary); border-color: #ccc; font-weight: 500; }
  .search-bar { padding: 0 16px 12px; }
  .search-bar input { width: 100%; padding: 10px; border-radius: 8px; border: 0.5px solid var(--border-light); background: var(--bg-secondary); }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 16px 16px; border-bottom: 0.5px solid var(--border-light); }
  .stat-card { background: var(--bg-secondary); padding: 10px; text-align: center; border-radius: 8px; }
  .stat-val { font-size: 18px; font-weight: 600; }
  .runner-card { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--border-light); gap: 12px; }
  .runner-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .runner-info { flex: 1; min-width: 0; }
  .runner-name { font-size: 14px; font-weight: 500; }
  .runner-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .status-badge { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 999px; }
  .badge-paid { background: var(--green-fill); color: var(--green-text); border: 0.5px solid var(--green-border); }
  .badge-unpaid { background: var(--red-fill); color: var(--red-text); border: 0.5px solid var(--red-border); }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div class="app-title" id="event-title">Registration</div>
    <div class="filter-row">
      <button class="filter-btn active" id="f-all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" id="f-paid" onclick="setFilter('paid')">Paid</button>
      <button class="filter-btn" id="f-unpaid" onclick="setFilter('unpaid')">Unpaid</button>
    </div>
    <div class="search-bar">
      <input type="search" id="search-input" placeholder="Search by name..." oninput="renderList()" />
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card">Total<br><span class="stat-val" id="stat-total">0</span></div>
    <div class="stat-card">Paid<br><span class="stat-val" id="stat-paid" style="color:var(--green-text)">0</span></div>
    <div class="stat-card">Unpaid<br><span class="stat-val" id="stat-unpaid" style="color:var(--red-text)">0</span></div>
  </div>
  <div id="runner-list"></div>
</div>

<script>
// REPLACE WITH YOUR URL
const CSV_URL = "YOUR_GOOGLE_SHEET_CSV_URL_HERE";

const COLORS = [{bg:'#E6F1FB',color:'#0C447C'},{bg:'#EAF3DE',color:'#27500A'},{bg:'#FAECE7',color:'#712B13'}];
let allData = [];
let currentFilter = 'all';

function avatarColor(n){ let h=0; for(let c of n) h=(h*31+c.charCodeAt(0))&0xffff; return COLORS[h%COLORS.length]; }

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('f-'+f).classList.add('active');
  renderList();
}

function renderList(){
  const search = document.getElementById('search-input').value.toLowerCase();
  const filtered = allData.filter(r=>{
    const name = (r.firstName + ' ' + r.lastName).toLowerCase();
    return (currentFilter==='all' || r.paid.toLowerCase()===currentFilter) && (!search || name.includes(search));
  });
  
  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-paid').textContent = allData.filter(r=>r.paid==='Paid').length;
  document.getElementById('stat-unpaid').textContent = allData.filter(r=>r.paid!=='Paid').length;
  
  document.getElementById('runner-list').innerHTML = filtered.map(r=>{
    const full = (r.firstName + ' ' + r.lastName).trim();
    const col = avatarColor(full);
    const badge = r.paid==='Paid' ? '<span class="status-badge badge-paid">Paid</span>' : '<span class="status-badge badge-unpaid">Unpaid</span>';
    return `<div class="runner-card">
      <div class="runner-avatar" style="background:${col.bg};color:${col.color}">${((r.firstName||'')[0]||'').toUpperCase()}</div>
      <div class="runner-info">
        <div class="runner-name">${full}</div>
        <div class="runner-meta">${r.category}</div>
      </div>${badge}</div>`;
  }).join('');
}

function parseCSV(text){
  // FIX: Filter out blank lines completely
  const lines = text.trim().split(/\r?\n/).filter(line => line.trim() !== "");
  const headers = lines[0].toLowerCase();
  const col = (...kw) => headers.split(',').findIndex(h=>kw.some(k=>h.includes(k)));
  const iFirst=col('first'); const iLast=col('last'); const iCat=col('cat','race'); const iPaid=col('paid','status');
  
  return lines.slice(1).map(line=>{
    const c = line.split(',');
    const paidText = (c[iPaid]||'').toLowerCase();
    return { 
        firstName: c[iFirst]||'', lastName: c[iLast]||'', category: c[iCat]||'General', 
        paid: (paidText.includes('yes')||paidText.includes('paid')||paidText.includes('1'))?'Paid':'Unpaid' 
    };
  }).filter(r => r.firstName.trim() !== ""); // Extra safety: ensure name exists
}

fetch(CSV_URL).then(r=>r.text()).then(text=>{
  allData = parseCSV(text);
  renderList();
});
</script>
</body>
</html>
