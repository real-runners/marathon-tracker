<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Marathon Registration Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeede9;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --text-hint: #9b9b96;
    --border-light: rgba(0,0,0,0.08);
    --border-mid: rgba(0,0,0,0.14);
    --green-fill: #EAF3DE;
    --green-border: #97C459;
    --green-text: #27500A;
    --red-fill: #FCEBEB;
    --red-border: #F09595;
    --red-text: #501313;
    --blue-strong: #185FA5;
    --blue-text: #0C447C;
    --font: -apple-system, 'Segoe UI', sans-serif;
  }

  html, body { height: 100%; font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg-primary); display: flex; flex-direction: column; }

  .top-bar { padding: 14px 16px; border-bottom: 0.5px solid var(--border-light); }
  .app-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
  .event-badge { font-size: 12px; background: var(--bg-secondary); padding: 4px 8px; border-radius: 4px; color: var(--text-secondary); }
  
  .filter-row { display: flex; gap: 6px; margin-top: 10px; }
  .filter-btn { font-size: 13px; padding: 5px 14px; border-radius: 999px; border: 0.5px solid var(--border-light); background: transparent; cursor: pointer; }
  .active-all    { background: var(--bg-tertiary); }
  .active-paid   { background: var(--green-fill); border-color: var(--green-border); color: var(--green-text); }
  .active-unpaid { background: var(--red-fill); border-color: var(--red-border); color: var(--red-text); }

  .search-bar { padding: 10px 16px; border-bottom: 0.5px solid var(--border-light); }
  .search-bar input { width: 100%; padding: 9px; border-radius: 8px; border: 0.5px solid var(--border-light); background: var(--bg-secondary); }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 16px; }
  .stat-card { background: var(--bg-secondary); padding: 10px; text-align: center; border-radius: 8px; }
  .stat-value { font-size: 20px; font-weight: 600; }

  .runner-list { flex: 1; padding-bottom: 20px; }
  .runner-card { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--border-light); gap: 12px; }
  .runner-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
  .runner-name { font-size: 14px; font-weight: 500; }
  .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
  .badge-paid   { background: var(--green-fill); color: var(--green-text); }
  .badge-unpaid { background: var(--red-fill); color: var(--red-text); }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; display: none; }
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div class="app-title">Race Registration</div>
    <div class="event-badge" id="event-badge">Loading...</div>
    <div class="filter-row">
      <button class="filter-btn active-all" id="f-all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" id="f-paid" onclick="setFilter('paid')">Paid</button>
      <button class="filter-btn" id="f-unpaid" onclick="setFilter('unpaid')">Unpaid</button>
    </div>
  </div>

  <div class="search-bar">
    <input type="search" id="search-input" placeholder="Search by name..." oninput="renderList()" />
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div style="font-size:10px">Total</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-paid" style="color:var(--green-text)">0</div><div style="font-size:10px">Paid</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-unpaid" style="color:var(--red-text)">0</div><div style="font-size:10px">Unpaid</div></div>
  </div>

  <div class="runner-list" id="runner-list"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// HARDCODED CONFIGURATION
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSTD04IlJf10BBEbhettYo_z6Rqqcqm6IFg4UL8NUDeRMoJSxfMnOIfk31j9Wv4KwIY3XZh2H39K49A/pub?gid=1547197644&single=true&output=csv";
const MARATHON_NAME = "Keeranalloor Marathon 2026";

let allData = [];
let currentFilter = 'all';

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initials(f,l){ return ((f||'')[0]||'').toUpperCase()+((l||'')[0]||'').toUpperCase(); }

function parseCSV(text){
  const lines = text.trim().split(/\r?\n/);
  if(lines.length < 2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().toLowerCase());
  const iFirst = headers.findIndex(h=>h.includes('first'));
  const iLast = headers.findIndex(h=>h.includes('last'));
  const iCat = headers.findIndex(h=>h.includes('cat')||h.includes('race'));
  const iPaid = headers.findIndex(h=>h.includes('paid')||h.includes('status'));
  
  return lines.slice(1).map(line=>{
    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c=>c.replace(/^"|"$/g,'').trim());
    const paidStatus = (cols[iPaid]||'').toLowerCase();
    const isPaid = (paidStatus === 'yes' || paidStatus === 'paid' || paidStatus === 'true' || paidStatus === '1');
    return { 
      firstName: cols[iFirst]||'', lastName: cols[iLast]||'', 
      category: cols[iCat]||'', paid: isPaid ? 'Paid' : 'Unpaid' 
    };
  }).filter(r => r.firstName);
}

function renderList(){
  const search = document.getElementById('search-input').value.toLowerCase();
  const filtered = allData.filter(r=>{
    const name = (r.firstName+' '+r.lastName).toLowerCase();
    return (currentFilter==='all' || r.paid.toLowerCase()===currentFilter) && (!search || name.includes(search));
  });
  
  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-paid').textContent = allData.filter(r=>r.paid==='Paid').length;
  document.getElementById('stat-unpaid').textContent = allData.filter(r=>r.paid==='Unpaid').length;
  
  document.getElementById('runner-list').innerHTML = filtered.map(r=>`
    <div class="runner-card">
      <div class="runner-avatar" style="background:#eee">${initials(r.firstName,r.lastName)}</div>
      <div style="flex:1; margin-left:12px">
        <div class="runner-name">${esc(r.firstName)} ${esc(r.lastName)}</div>
        <div style="font-size:12px; color:#666">${esc(r.category)}</div>
      </div>
      <span class="status-badge ${r.paid==='Paid'?'badge-paid':'badge-unpaid'}">${r.paid}</span>
    </div>
  `).join('');
}

function setFilter(f){
  currentFilter = f;
  ['all','paid','unpaid'].forEach(k => document.getElementById('f-'+k).className = 'filter-btn' + (k===f ? ' active-'+k : ''));
  renderList();
}

function fetchSheet(){
  fetch(CSV_URL, {cache:'no-cache'}).then(r=>r.text()).then(text=>{
    allData = parseCSV(text);
    renderList();
    document.getElementById('toast').style.display = 'block';
    document.getElementById('toast').textContent = "Updated with " + allData.length + " runners";
    setTimeout(()=>document.getElementById('toast').style.display = 'none', 3000);
  });
}

// Initial Load
document.getElementById('event-badge').textContent = MARATHON_NAME;
fetchSheet();
setInterval(fetchSheet, 5*60*1000); // Auto refresh every 5 mins
</script>
</body>
</html>
