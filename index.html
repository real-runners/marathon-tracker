<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Race Registration</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#fff; --text:#1a1a18; --green:#27500A; --green-bg:#EAF3DE; --red:#501313; --red-bg:#FCEBEB; --border:rgba(0,0,0,0.08); }
  body { font-family: -apple-system, sans-serif; background: #eeede9; color: var(--text); }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; }
  .header { padding: 20px; border-bottom: 1px solid var(--border); }
  .title { font-weight: 700; font-size: 18px; margin-bottom: 10px; }
  .controls { display: flex; gap: 8px; margin-bottom: 15px; }
  button { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: #f5f5f3; cursor: pointer; font-size: 13px; }
  button.active { background: #e0e0e0; font-weight: 600; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 20px 20px; }
  .stat { background: #f5f5f3; padding: 10px; text-align: center; border-radius: 8px; }
  .stat-val { font-size: 18px; font-weight: 700; }
  .runner { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border); }
  .info { flex: 1; }
  .name { font-weight: 600; }
  .km { font-size: 13px; color: #666; }
  .status { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .paid { background: var(--green-bg); color: var(--green); }
  .unpaid { background: var(--red-bg); color: var(--red); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="title" id="event-name">Loading...</div>
    <div class="controls">
      <button class="active" id="f-all" onclick="setFilter('all')">All</button>
      <button id="f-paid" onclick="setFilter('paid')">Paid</button>
      <button id="f-unpaid" onclick="setFilter('unpaid')">Unpaid</button>
    </div>
    <input type="text" id="search" placeholder="Search name..." style="width:100%; padding:8px; border-radius:8px; border:1px solid #ddd;" oninput="renderList()">
  </div>
  <div class="stats">
    <div class="stat">Total<br><span class="stat-val" id="total">0</span></div>
    <div class="stat">Paid<br><span class="stat-val" id="paid">0</span></div>
    <div class="stat">Unpaid<br><span class="stat-val" id="unpaid">0</span></div>
  </div>
  <div id="list"></div>
</div>

<script>
// --- CONFIGURATION ---
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSTD04IlJf10BBEbhettYo_z6Rqqcqm6IFg4UL8NUDeRMoJSxfMnOIfk31j9Wv4KwIY3XZh2H39K49A/pub?gid=1547197644&single=true&output=csv";
const EVENT_NAME = "Keeranalloor Marathon 2026";
// ---------------------

let allData = [];
let currentFilter = 'all';

document.getElementById('event-name').textContent = EVENT_NAME;

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
  document.getElementById('f-'+f).classList.add('active');
  renderList();
}

function renderList(){
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allData.filter(r => {
    const name = (r.firstName + ' ' + r.lastName).toLowerCase();
    const matchType = (currentFilter === 'all' || r.paid.toLowerCase() === currentFilter);
    return matchType && name.includes(q);
  });
  
  document.getElementById('total').textContent = allData.length;
  document.getElementById('paid').textContent = allData.filter(r=>r.paid==='Paid').length;
  document.getElementById('unpaid').textContent = allData.filter(r=>r.paid==='Unpaid').length;
  
  document.getElementById('list').innerHTML = filtered.map(r => `
    <div class="runner">
      <div class="info">
        <div class="name">${r.firstName} ${r.lastName}</div>
        <div class="km">${r.category}</div>
      </div>
      <div class="status ${r.paid==='Paid'?'paid':'unpaid'}">${r.paid}</div>
    </div>
  `).join('');
}

function parseCSV(text){
  const lines = text.split('\n').filter(l=>l.trim());
  if(lines.length < 2) return [];
  const headers = lines[0].toLowerCase();
  // Finding indices
  const iFirst = headers.split(',').findIndex(h=>h.includes('first'));
  const iLast = headers.split(',').findIndex(h=>h.includes('last'));
  const iCat = headers.split(',').findIndex(h=>h.includes('cat')||h.includes('race'));
  const iPaid = headers.split(',').findIndex(h=>h.includes('paid')||h.includes('status'));
  
  return lines.slice(1).map(line => {
    const c = line.split(',');
    const paidText = (c[iPaid]||'').toLowerCase();
    return { 
      firstName: c[iFirst]||'', 
      lastName: c[iLast]||'', 
      category: c[iCat]||'', 
      paid: (paidText.includes('yes')||paidText.includes('paid')||paidText.includes('y')||paidText.includes('1'))?'Paid':'Unpaid' 
    };
  });
}

fetch(CSV_URL).then(r=>r.text()).then(text=>{
   allData = parseCSV(text);
   renderList();
}).catch(e=>console.error("Fetch failed"));
</script>
</body>
</html>
